# Smoke test against local build; will add image-based job once docker-image lands.
# This workflow is the executable spec for the README's quickstart steps.
# If the quickstart breaks on a PR, this workflow catches it.
name: quickstart
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  quickstart:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          # go-version-file keeps CI in lockstep with go.mod toolchain directive
          go-version-file: go.mod

      - name: build portal
        run: go build -o portal ./cmd/portal

      - name: run portal and verify healthcheck
        env:
          JAMSESH_BIND: 127.0.0.1:18443
          JAMSESH_TLS_MODE: behind_proxy
          JAMSESH_DB_DRIVER: sqlite
          JAMSESH_DB_DSN: ./test.db
        run: |
          # Capture portal output so it's visible in the CI log on failure
          ./portal > portal.log 2>&1 &
          pid=$!

          # Wait for /healthz to come up (max 10 s, polling every 0.5 s)
          for i in $(seq 1 20); do
            sleep 0.5
            if curl -fsS http://127.0.0.1:18443/healthz | grep -q '"status":"ok"'; then
              echo "healthcheck passed"
              # SIGTERM exercises the graceful-shutdown path
              kill "$pid"
              # Wait for the process to exit; suppress signal-exit non-zero
              wait "$pid" || true
              exit 0
            fi
          done

          echo "portal failed to come up after 10 s" >&2
          kill "$pid" || true
          wait "$pid" || true
          exit 1

      - name: dump portal log on failure
        if: failure()
        run: cat portal.log
