openapi: 3.0.3
info:
  title: jamsesh portal
  version: 0.0.1
  description: |
    REST surface for the jamsesh portal. Single source of truth for
    server interfaces (oapi-codegen) and client types
    (openapi-typescript). Authoring rules in
    docs/SPEC.md > Generated contracts.

    OpenAPI version: 3.0.3 (locked — oapi-codegen mainline does not yet
    support 3.1; migration trigger in docs/SPEC.md > Generated contracts).

    Authoring rules (3.0.3 subset constraints):
    - Use `nullable: true` NOT `type: [string, "null"]`
    - Use `example:` NOT `examples:` (array form is 3.1)
    - No `webhooks:` block
    - No `$schema` annotation
    - All schemas under components.schemas; use $ref everywhere

servers:
  - url: https://{host}
    variables:
      host:
        default: localhost:8443
        description: Portal host and port

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Opaque bearer token issued by the portal OAuth flow.
        Present on all REST calls, MCP calls, and git-over-HTTPS
        (as HTTP Basic password). One token per user account.

  schemas:
    ErrorEnvelope:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: machine-readable error code (e.g. "auth.invalid_token")
          example: auth.invalid_token
        message:
          type: string
          description: human-readable error message
          example: invalid token
        details:
          type: object
          additionalProperties: true
          description: |
            Optional structured context for the error. Shape is
            code-specific; omitted when there is nothing to add.

    TokenPair:
      type: object
      required: [access_token, refresh_token, access_expires_at, refresh_expires_at]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time

    MagicLinkRequestBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          example: user@example.com

    OAuthStartBody:
      type: object
      required: [provider]
      properties:
        provider:
          type: string
          description: OAuth provider name, e.g. "github"
          example: github

    OAuthStartResponse:
      type: object
      required: [authorize_url]
      properties:
        authorize_url:
          type: string
          description: Provider authorization URL the browser should be redirected to

    OAuthCallbackBody:
      type: object
      required: [provider, code, state]
      properties:
        provider:
          type: string
          description: OAuth provider name, e.g. "github"
          example: github
        code:
          type: string
          description: Authorization code from the provider
        state:
          type: string
          description: State nonce echoed back from the provider

    MagicLinkExchangeBody:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Raw magic-link token from the URL query parameter

    # ---------------------------------------------------------------------------
    # WebSocket event envelope + per-event-type payload schemas
    #
    # Every event pushed over the portal WebSocket shares the EventEnvelope
    # wrapper. The `type` field is the discriminator; the `payload` field is a
    # oneOf over the 12 payload schemas below.
    #
    # Discriminator semantics (OpenAPI 3.0.3):
    #   The discriminator lives on EventEnvelope, with propertyName: "type".
    #   The mapping keys are the string values of `type`; the mapping values
    #   point at the corresponding payload schema. oapi-codegen v2 generates
    #   an `AsXxxPayload() (XxxPayload, error)` accessor per oneOf variant plus
    #   a `Discriminator() string` method on the envelope's Payload union type.
    #   TypeScript consumers get a discriminated union on `payload` keyed by
    #   the sibling `type` field via openapi-typescript's oneOf expansion.
    # ---------------------------------------------------------------------------

    EventEnvelope:
      type: object
      required: [seq, version, type, payload, timestamp, session_id]
      properties:
        seq:
          type: integer
          format: int64
          description: Monotonic per-session sequence number
        version:
          type: integer
          enum: [1]
          description: Envelope version; always 1
        type:
          type: string
          description: Event type; used as discriminator for payload
          enum:
            - auto-merger.backpressure
            - commit.arrived
            - merge.succeeded
            - conflict.detected
            - conflict.resolved
            - comment.added
            - comment.resolved
            - ref.forked
            - mode.changed
            - turn.ended
            - presence.updated
            - session.created
            - session.finalizing
            - session.ended
            - playground.destruction_warning
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp of event emission
        session_id:
          type: string
          description: Session this event belongs to
        payload:
          oneOf:
            - $ref: '#/components/schemas/AutoMergerBackpressurePayload'
            - $ref: '#/components/schemas/CommitArrivedPayload'
            - $ref: '#/components/schemas/MergeSucceededPayload'
            - $ref: '#/components/schemas/ConflictDetectedPayload'
            - $ref: '#/components/schemas/ConflictResolvedPayload'
            - $ref: '#/components/schemas/CommentAddedPayload'
            - $ref: '#/components/schemas/CommentResolvedPayload'
            - $ref: '#/components/schemas/RefForkedPayload'
            - $ref: '#/components/schemas/ModeChangedPayload'
            - $ref: '#/components/schemas/TurnEndedPayload'
            - $ref: '#/components/schemas/PresenceUpdatedPayload'
            - $ref: '#/components/schemas/SessionCreatedPayload'
            - $ref: '#/components/schemas/SessionFinalizingPayload'
            - $ref: '#/components/schemas/SessionEndedPayload'
            - $ref: '#/components/schemas/PlaygroundDestructionWarningPayload'
      discriminator:
        propertyName: type
        mapping:
          auto-merger.backpressure: '#/components/schemas/AutoMergerBackpressurePayload'
          commit.arrived: '#/components/schemas/CommitArrivedPayload'
          merge.succeeded: '#/components/schemas/MergeSucceededPayload'
          conflict.detected: '#/components/schemas/ConflictDetectedPayload'
          conflict.resolved: '#/components/schemas/ConflictResolvedPayload'
          comment.added: '#/components/schemas/CommentAddedPayload'
          comment.resolved: '#/components/schemas/CommentResolvedPayload'
          ref.forked: '#/components/schemas/RefForkedPayload'
          mode.changed: '#/components/schemas/ModeChangedPayload'
          turn.ended: '#/components/schemas/TurnEndedPayload'
          presence.updated: '#/components/schemas/PresenceUpdatedPayload'
          session.created: '#/components/schemas/SessionCreatedPayload'
          session.finalizing: '#/components/schemas/SessionFinalizingPayload'
          session.ended: '#/components/schemas/SessionEndedPayload'
          playground.destruction_warning: '#/components/schemas/PlaygroundDestructionWarningPayload'

    # --- Payload schemas (PROTOCOL.md field names are canonical) ---

    AutoMergerBackpressurePayload:
      type: object
      description: >
        The auto-merger work queue was full when a commit.arrived event was
        received; the commit was dropped from the merge pipeline. Emitted so
        clients can surface backpressure warnings. PROTOCOL.md canonical
        fields: session_id, dropped_ref.
      required: [session_id]
      properties:
        session_id:
          type: string
          description: ID of the session whose auto-merger queue was full
        dropped_ref:
          type: string
          description: The session ref whose commit was dropped from the queue (omitted if unknown)

    CommitArrivedPayload:
      type: object
      description: >
        A commit was pushed to a session ref. PROTOCOL.md canonical fields:
        ref, sha, author_id, summary.
      required: [ref, sha, author_id, summary]
      properties:
        ref:
          type: string
          description: The session ref the commit landed on (e.g. jam/<session>/<user>/<branch>)
        sha:
          type: string
          description: The commit SHA that arrived
        author_id:
          type: string
          description: Account ID of the commit author
        summary:
          type: string
          description: One-line summary of the commit message

    MergeSucceededPayload:
      type: object
      description: >
        Auto-merger successfully merged a source commit into the draft tip.
        PROTOCOL.md canonical fields: source_sha, draft_sha, merge_commit_sha.
      required: [source_sha, draft_sha, merge_commit_sha]
      properties:
        source_sha:
          type: string
          description: The source commit SHA that was merged
        draft_sha:
          type: string
          description: The draft tip SHA after the merge
        merge_commit_sha:
          type: string
          description: The merge commit SHA created by the auto-merger

    ConflictFileRange:
      type: object
      required: [start, end]
      properties:
        start:
          type: integer
          description: Start line (1-indexed) of the conflict range
        end:
          type: integer
          description: End line (1-indexed) of the conflict range

    ConflictFile:
      type: object
      required: [file, ranges]
      properties:
        file:
          type: string
          description: File path within the repository
        ranges:
          type: array
          items:
            $ref: '#/components/schemas/ConflictFileRange'
          description: Line ranges in conflict within this file

    ConflictDetectedPayload:
      type: object
      description: >
        Auto-merger detected a three-way merge conflict. Payload is the full
        conflict event per PROTOCOL.md conflict event schema.
        PROTOCOL.md canonical fields: id, session_id, source_commit_sha,
        source_ref, draft_tip_sha, ancestor_sha, conflicts, addressed_to,
        status, resolving_commit_sha, resolved_at, created_at.
      required: [id, session_id, source_commit_sha, source_ref, draft_tip_sha, ancestor_sha, conflicts, addressed_to, status, created_at]
      properties:
        id:
          type: string
          description: Conflict event ID (UUID)
        session_id:
          type: string
          description: Session the conflict belongs to
        source_commit_sha:
          type: string
          description: The commit that could not be merged
        source_ref:
          type: string
          description: The ref the source commit came from
        draft_tip_sha:
          type: string
          description: The draft tip at the time of the failed merge attempt
        ancestor_sha:
          type: string
          description: The common ancestor commit SHA
        conflicts:
          type: array
          items:
            $ref: '#/components/schemas/ConflictFile'
          description: Per-file conflict details
        addressed_to:
          type: array
          items:
            type: string
          description: Addressing tokens for impacted participants (e.g. "@user/branch")
        status:
          type: string
          enum: [open, resolved, abandoned]
          description: Current status of this conflict
        resolving_commit_sha:
          type: string
          nullable: true
          description: Set when a Resolves-Conflict trailer matches this event
        resolved_at:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp when the conflict was resolved
        created_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the conflict was detected

    ConflictResolvedPayload:
      type: object
      description: >
        A conflict has been resolved via a commit with a matching
        Resolves-Conflict trailer.
        PROTOCOL.md canonical fields: event_id, resolving_commit_sha.
      required: [event_id, resolving_commit_sha]
      properties:
        event_id:
          type: string
          description: The conflict event ID that was resolved
        resolving_commit_sha:
          type: string
          description: The commit SHA that resolved the conflict

    CommentAnchor:
      type: object
      required: [commit_sha]
      properties:
        commit_sha:
          type: string
          description: The commit being commented on
        file_path:
          type: string
          nullable: true
          description: File within the commit's tree; null for commit-level comments
        line_range:
          nullable: true
          description: 1-indexed line range; null for file-level or commit-level comments
          allOf:
            - $ref: '#/components/schemas/ConflictFileRange'

    CommentAddedPayload:
      type: object
      description: >
        A comment was posted in the session. Payload is the full comment per
        PROTOCOL.md comment schema.
        PROTOCOL.md canonical fields: id, session_id, author_id, author_kind,
        anchor, body, addressed_to, kind, created_at, resolved_at,
        resolved_by, resolution_note.
      required: [id, session_id, author_id, author_kind, anchor, body, kind, created_at]
      properties:
        id:
          type: string
          description: Comment ID (UUID)
        session_id:
          type: string
          description: Session the comment belongs to
        author_id:
          type: string
          description: Account ID of the comment author
        author_kind:
          type: string
          enum: [human, agent]
          description: Whether the author is a human or an agent
        anchor:
          $ref: '#/components/schemas/CommentAnchor'
        body:
          type: string
          description: Comment body in markdown
        addressed_to:
          type: string
          nullable: true
          description: Addressing token (e.g. "@user", "@user/branch", "@all-agents")
        kind:
          type: string
          enum: [fyi, question, suggestion, action-request]
          description: Comment kind
        created_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp of creation
        resolved_at:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp when resolved; null if open
        resolved_by:
          type: string
          nullable: true
          description: Account ID of resolver; null if open
        resolution_note:
          type: string
          nullable: true
          description: Optional resolution note

    CommentResolvedPayload:
      type: object
      description: >
        A comment was marked resolved.
        PROTOCOL.md canonical fields: comment_id, resolved_by, note.
      required: [comment_id, resolved_by]
      properties:
        comment_id:
          type: string
          description: The comment ID that was resolved
        resolved_by:
          type: string
          description: Account ID of the user who resolved the comment
        note:
          type: string
          nullable: true
          description: Optional resolution note

    RefForkedPayload:
      type: object
      description: >
        A participant forked a new session ref.
        PROTOCOL.md canonical fields: ref, parent_sha, mode.
      required: [ref, parent_sha, mode]
      properties:
        ref:
          type: string
          description: The new ref name (e.g. jam/<session>/<user>/<branch>)
        parent_sha:
          type: string
          description: The commit SHA the new ref was parented at
        mode:
          type: string
          description: The collaboration mode of the new ref (sync or isolated)

    ModeChangedPayload:
      type: object
      description: >
        A ref's collaboration mode was changed.
        PROTOCOL.md canonical fields: ref, old_mode, new_mode.
      required: [ref, old_mode, new_mode]
      properties:
        ref:
          type: string
          description: The ref whose mode changed
        old_mode:
          type: string
          description: The previous mode
        new_mode:
          type: string
          description: The new mode

    TurnEndedPayload:
      type: object
      description: >
        A participant's turn ended; they yielded control back to the human.
        PROTOCOL.md canonical fields: user_id, ref, final_sha.
      required: [user_id, ref, final_sha]
      properties:
        user_id:
          type: string
          description: Account ID of the participant whose turn ended
        ref:
          type: string
          description: The ref the participant was working on
        final_sha:
          type: string
          description: The final commit SHA on the ref at turn end

    PresenceUpdatedPayload:
      type: object
      description: >
        A participant's presence (active ref + tip SHA) was updated.
        PROTOCOL.md canonical fields: user_id, ref, current_sha, last_active.
      required: [user_id, ref, current_sha, last_active]
      properties:
        user_id:
          type: string
          description: Account ID of the participant
        ref:
          type: string
          description: The ref the participant is currently on
        current_sha:
          type: string
          description: The current tip SHA of the participant's ref
        last_active:
          type: string
          format: date-time
          description: ISO-8601 timestamp of last participant activity

    SessionCreatedPayload:
      type: object
      description: >
        A new session was created.
        PROTOCOL.md canonical fields: session_id, org_id, name, creator_id.
      required: [session_id, org_id, name, creator_id]
      properties:
        session_id:
          type: string
          description: ID of the newly created session
        org_id:
          type: string
          description: ID of the org this session belongs to
        name:
          type: string
          description: Display name of the session
        creator_id:
          type: string
          description: Account ID of the session creator

    SessionFinalizingPayload:
      type: object
      description: >
        A session has entered the finalizing state.
        PROTOCOL.md canonical fields: by_user_id.
      required: [by_user_id]
      properties:
        by_user_id:
          type: string
          description: Account ID of the participant who initiated finalization

    SessionEndedPayload:
      type: object
      description: >
        A session has ended (finalized, abandoned, timed out, or shipped).
        PROTOCOL.md canonical fields: reason, final_branch_name.
      required: [reason]
      properties:
        reason:
          type: string
          enum: [finalize, abandon, timeout, shipped]
          description: The reason the session ended
        final_branch_name:
          type: string
          nullable: true
          description: |
            When reason=shipped and the user supplied the target branch on
            mark-shipped, the branch name the squash commit was pushed to.
            Null otherwise.

    PlaygroundDestructionWarningPayload:
      type: object
      description: >
        A playground session is ~5 minutes from destruction due to idle timeout
        or hard cap. Emitted once per warning kind per session lifetime.
        PROTOCOL.md canonical fields: reason, ends_at, remaining_seconds, session_id.
      required: [reason, ends_at, remaining_seconds, session_id]
      properties:
        reason:
          type: string
          enum: [idle_timeout, hard_cap]
          description: What triggered the destruction countdown
        ends_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the session will be destroyed
        remaining_seconds:
          type: integer
          description: Approximate seconds remaining until destruction at time of emission
        session_id:
          type: string
          description: ID of the playground session that is about to be destroyed

    # ---------------------------------------------------------------------------
    # Accounts & orgs schemas
    # ---------------------------------------------------------------------------

    MeOrgMembership:
      type: object
      required: [id, name, slug, role]
      properties:
        id:
          type: string
          description: Org UUID
          example: "01926e42-0000-7000-a000-000000000001"
        name:
          type: string
          description: Org display name
          example: "acme"
        slug:
          type: string
          description: URL-safe org slug
          example: "acme"
        role:
          type: string
          description: The authenticated account's role in this org
          example: "creator"

    MeResponse:
      type: object
      required: [id, email, display_name, orgs]
      properties:
        id:
          type: string
          description: Account UUID
          example: "01926e42-0000-7000-a000-000000000000"
        email:
          type: string
          format: email
          description: Verified email address
          example: user@example.com
        display_name:
          type: string
          description: Human-readable display name
          example: "Ada Lovelace"
        orgs:
          type: array
          items:
            $ref: '#/components/schemas/MeOrgMembership'
          description: All org memberships for this account

    OrgRef:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
          description: Org UUID
          example: "01926e42-0000-7000-a000-000000000001"
        name:
          type: string
          description: Org display name
          example: "acme"
        slug:
          type: string
          description: URL-safe org slug
          example: "acme"

    OrgSessionInvitePolicy:
      type: string
      enum: [members_only, open]
      description: |
        Controls who may accept session invites in this org.
        `members_only` (default) requires the invitee to already be an
        `org_member`. `open` allows email-invitees to join as
        session-scoped guests without org membership.
      example: members_only

    Org:
      type: object
      required: [id, name, slug, session_invite_policy]
      properties:
        id:
          type: string
          description: Org UUID
          example: "01926e42-0000-7000-a000-000000000001"
        name:
          type: string
          description: Org display name
          example: "acme"
        slug:
          type: string
          description: URL-safe org slug
          example: "acme"
        session_invite_policy:
          $ref: '#/components/schemas/OrgSessionInvitePolicy'

    CreateOrgBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 200
          description: Desired org name; used to derive the slug
          example: "acme"

    MemberRef:
      type: object
      required: [account_id, email, display_name, role, joined_at]
      properties:
        account_id:
          type: string
          description: Account UUID
          example: "01926e42-0000-7000-a000-000000000000"
        email:
          type: string
          format: email
          description: Member's email address
          example: user@example.com
        display_name:
          type: string
          description: Member's display name
          example: "Ada Lovelace"
        role:
          type: string
          description: Member's role in the org
          example: "member"
        joined_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the member joined the org

    InviteBody:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address to invite
          example: invitee@example.com

    InviteRef:
      type: object
      required: [id, recipient_email, expires_at]
      properties:
        id:
          type: string
          description: Invite ID
          example: "01926e42-0000-7000-a000-000000000002"
        recipient_email:
          type: string
          format: email
          description: Email address the invite was sent to
          example: invitee@example.com
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the invite expires

    AcceptInviteBody:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Raw invite token from the email link query parameter

    # ---------------------------------------------------------------------------
    # Sessions lifecycle schemas
    # ---------------------------------------------------------------------------

    MemberSummary:
      type: object
      required: [account_id, role, joined_at]
      properties:
        account_id:
          type: string
          description: Account UUID
          example: "01926e42-0000-7000-a000-000000000000"
        role:
          type: string
          description: Member's role in the session (creator or member)
          example: "creator"
        joined_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the member joined the session

    Session:
      type: object
      required: [id, org_id, name, goal, scope, default_mode, status, created_at, members]
      properties:
        id:
          type: string
          description: Session UUID
          example: "01926e42-0000-7000-a000-000000000010"
        org_id:
          type: string
          description: Owning org UUID
          example: "01926e42-0000-7000-a000-000000000001"
        name:
          type: string
          description: Short display name for the session
          example: "Fix auth bug"
        goal:
          type: string
          description: Free-text description of the session's objective
          example: "Resolve the token refresh race condition in auth middleware"
        scope:
          type: string
          description: JSON array of path glob strings defining the writable scope
          example: '["src/auth/**","tests/auth/**"]'
        default_mode:
          type: string
          enum: [sync, isolated]
          description: Default ref mode for session participants
          example: "sync"
        status:
          type: string
          enum: [active, finalizing, ended, archived]
          description: Lifecycle status of the session
          example: "active"
        base_sha:
          type: string
          nullable: true
          description: The base commit SHA this session branched from; null until first push
        end_reason:
          type: string
          nullable: true
          description: Why the session ended; null while active
          example: "abandoned"
        finalize_locked_by_account_id:
          type: string
          nullable: true
          description: Account ID holding the finalize-flow lock; null when unlocked
        created_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the session was created
        ended_at:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp when the session ended; null while active
        members:
          type: array
          items:
            $ref: '#/components/schemas/MemberSummary'
          description: Current session members

    CreateSessionRequest:
      type: object
      required: [name, goal, scope, default_mode]
      properties:
        name:
          type: string
          maxLength: 200
          description: Short display name for the session
          example: "Fix auth bug"
        goal:
          type: string
          maxLength: 4096
          description: Free-text description of the session's objective
          example: "Resolve the token refresh race condition in auth middleware"
        scope:
          type: string
          description: JSON array of path glob strings defining the writable scope
          example: '["src/auth/**","tests/auth/**"]'
        default_mode:
          type: string
          enum: [sync, isolated]
          description: Default ref mode for session participants
          example: "sync"

    PatchSessionRequest:
      type: object
      description: |
        Fields that can be updated on an active session. All fields are optional;
        only present fields are updated. Scope is append-only (narrowing is rejected).
      properties:
        goal:
          type: string
          maxLength: 4096
          description: Updated session goal
          example: "Also fix the logout path"
        scope:
          type: string
          description: |
            Updated JSON array of path globs. Must be a superset of the current scope
            (scope narrowing is rejected with 400 session.scope_narrowing_rejected).
          example: '["src/auth/**","tests/auth/**","src/logout/**"]'
        default_mode:
          type: string
          enum: [sync, isolated]
          description: Updated default ref mode

    # ---------------------------------------------------------------------------
    # Sessions listing, state, refs, digest schemas
    # ---------------------------------------------------------------------------

    SessionListResponse:
      type: object
      required: [items]
      description: Cursor-paginated list of sessions.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Session'
          description: Sessions on this page, ordered by created_at DESC
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor token. Pass as `cursor` query parameter to fetch the
            next page. Absent or null when there are no more pages.

    Ref:
      type: object
      required: [ref, sha, mode]
      description: A git ref in the session bare repository with its current mode.
      properties:
        ref:
          type: string
          description: Full ref name (e.g. refs/heads/jam/<session>/<user>/<branch>)
          example: "refs/heads/jam/01JVXYZ/01ACCABC/main"
        sha:
          type: string
          description: Current tip commit SHA (40 hex chars)
          example: "abc123def456abc123def456abc123def456abc1"
        mode:
          $ref: '#/components/schemas/RefMode'
          description: Collaboration mode for this ref (per-ref override or session default)
          example: "sync"

    RefListResponse:
      type: object
      required: [refs]
      description: All refs in the session repository with mode annotations.
      properties:
        refs:
          type: array
          items:
            $ref: '#/components/schemas/Ref'
          description: All session refs (jam/* namespace)

    DigestResponse:
      type: object
      required: [text, next_cursor]
      description: |
        Turn-start digest for the local binary's additionalContext injection.
        Contains a formatted text block summarising activity since the cursor,
        a next_cursor for the next call, and an optional list of urgent events
        (e.g. playground destruction warnings) that the binary should surface
        prominently regardless of the text content.
      properties:
        text:
          type: string
          description: |
            Formatted plain-text digest following PROTOCOL.md > Session state > Digest.
            Includes peer commit activity, comments, conflicts, mode changes, and
            a current-state summary (goal, your refs, draft tip).
        next_cursor:
          type: integer
          format: int64
          description: |
            Max event seq seen in this digest. Pass as `since` on the next call.
        urgent_events:
          type: array
          description: |
            Optional list of time-sensitive events the binary must surface prominently.
            Currently only playground.destruction_warning events appear here.
            Absent (or empty) on non-playground sessions or when no urgent events exist.
          items:
            $ref: '#/components/schemas/PlaygroundDestructionWarningPayload'

    # ---------------------------------------------------------------------------
    # Session invites schemas
    # ---------------------------------------------------------------------------

    InviteRequest:
      type: object
      required: [email]
      description: Request body for inviting an account to a session by email.
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          description: Email address of the invitee
          example: peer@example.com

    Invite:
      type: object
      required: [id, session_id, invitee_email, expires_at]
      description: A pending session invite record.
      properties:
        id:
          type: string
          description: Invite UUID
          example: "01926e42-0000-7000-a000-000000000020"
        session_id:
          type: string
          description: Session this invite is for
          example: "01926e42-0000-7000-a000-000000000010"
        invitee_email:
          type: string
          format: email
          description: Email address of the invitee
          example: peer@example.com
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the invite expires

    AcceptInviteRequest:
      type: object
      required: [token]
      description: Request body for accepting a session invite.
      properties:
        token:
          type: string
          description: Raw invite token from the email link query parameter

    SessionInviteDetails:
      type: object
      required: [invite_id, org_name, session_id, session_name, invited_by_name, expires_at, your_role_on_accept]
      description: Invite details returned before the user clicks Accept; used to render the InviteAccept onboarding-hero screen.
      properties:
        invite_id:
          type: string
          description: Invite ID
        org_name:
          type: string
          description: Display name of the org the session belongs to
        session_id:
          type: string
          description: Session ID
        session_name:
          type: string
          description: Display name of the session
        session_goal:
          type: string
          nullable: true
          description: Optional session goal text
        invited_by_name:
          type: string
          description: Display name of the account that issued the invite
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the invite expires
        your_role_on_accept:
          type: string
          enum: [member]
          description: Role the invitee will receive when they accept

    # ---------------------------------------------------------------------------
    # Comments schemas
    # ---------------------------------------------------------------------------

    CommentKind:
      type: string
      enum: [question, suggestion, action-request, fyi]
      description: Structured kind of comment

    Comment:
      type: object
      required: [id, session_id, author_id, author_kind, anchor, body, kind, created_at]
      description: A comment anchored to a commit in a session.
      properties:
        id:
          type: string
          description: Comment ID (ULID)
          example: "01926e42-0000-7000-a000-000000000030"
        session_id:
          type: string
          description: Session the comment belongs to
          example: "01926e42-0000-7000-a000-000000000010"
        author_id:
          type: string
          description: Account ID of the comment author
          example: "01926e42-0000-7000-a000-000000000000"
        author_kind:
          type: string
          enum: [human, agent]
          description: Whether the author is a human or an agent
        anchor:
          $ref: '#/components/schemas/CommentAnchor'
        body:
          type: string
          description: Comment body in markdown
        addressed_to:
          type: string
          nullable: true
          description: Addressing token (e.g. "@user", "@user/branch", "@all-agents")
        kind:
          $ref: '#/components/schemas/CommentKind'
        created_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp of creation
        resolved_at:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 timestamp when resolved; null if open
        resolved_by:
          type: string
          nullable: true
          description: Account ID of resolver; null if open
        resolution_note:
          type: string
          nullable: true
          description: Optional resolution note

    CommentListResponse:
      type: object
      required: [items]
      description: Cursor-paginated list of comments.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
          description: Comments on this page, ordered by created_at DESC
        next_cursor:
          type: string
          nullable: true
          description: |
            Opaque cursor token. Pass as `cursor` query parameter to fetch the
            next page. Absent or null when there are no more pages.

    ResolveCommentRequest:
      type: object
      description: Request body for resolving a comment.
      properties:
        resolution_note:
          type: string
          maxLength: 4096
          nullable: true
          description: Optional resolution note

    CreateCommentRequest:
      type: object
      required: [anchor_commit_sha, body, kind]
      description: Request body for creating a comment.
      properties:
        anchor_commit_sha:
          type: string
          description: Commit SHA the comment is anchored to
        anchor_file_path:
          type: string
          nullable: true
          description: File path within the commit tree; null for commit-level comments
        anchor_line_start:
          type: integer
          nullable: true
          description: 1-indexed start line; null for file-level or commit-level comments
        anchor_line_end:
          type: integer
          nullable: true
          description: 1-indexed end line; null for file-level or commit-level comments
        body:
          type: string
          maxLength: 4096
          description: Comment body in markdown
        addressed_to:
          type: string
          nullable: true
          description: Addressing token (e.g. "@user", "@all-agents")
        kind:
          $ref: '#/components/schemas/CommentKind'

    SessionFileResponse:
      type: object
      required: [content, mime, is_binary]
      description: Text content of a file at a specific commit.
      properties:
        content:
          type: string
          description: UTF-8 file content; empty when is_binary is true
        mime:
          type: string
          description: Detected MIME type (e.g. "text/plain", "application/octet-stream")
        is_binary:
          type: boolean
          description: True when the file is detected as binary

    RefMode:
      type: string
      enum: [sync, isolated]
      description: Collaboration mode for a session ref

    UpsertRefModeRequest:
      type: object
      required: [ref, mode]
      description: Request body for upserting a ref's collaboration mode.
      properties:
        ref:
          type: string
          description: Full ref name (e.g. "refs/heads/jam/<session>/<user>/<branch>")
        mode:
          $ref: '#/components/schemas/RefMode'

    PlanMode:
      type: string
      enum: [squash, preserve]
      description: |
        Finalization mode. squash composes one commit from N curated
        commits with a Co-authored-by trailer list; preserve cherry-picks
        each curated commit individually.

    FinalizeLock:
      type: object
      required:
        - id
        - session_id
        - acquired_by_account_id
        - acquired_at
        - last_activity_at
        - expires_at
        - selected_commit_shas
        - target_branch
        - base_sha
        - mode
      description: |
        Durable finalize-flow lock row. Captures the in-flight curation
        state for one finalize coordination.
      properties:
        id:
          type: string
        session_id:
          type: string
        acquired_by_account_id:
          type: string
        acquired_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          description: |
            last_activity_at + 30-minute idle TTL. Recomputed on every
            read; not stored.
        selected_commit_shas:
          type: array
          items:
            type: string
          description: Ordered list of curated commit SHAs.
        target_branch:
          type: string
        base_sha:
          type: string
        mode:
          $ref: '#/components/schemas/PlanMode'
        commit_message:
          type: string
          nullable: true
          description: Composed squash commit message (squash mode only).

    LockStatus:
      type: object
      required:
        - lock_id
        - held_by_account_id
        - acquired_at
        - last_activity_at
        - expires_at
        - is_caller
      description: |
        Lock pointer + caller-relative metadata. Returned by
        acquireFinalizeLock and embedded in the finalize-plan response.
      properties:
        lock_id:
          type: string
        held_by_account_id:
          type: string
        acquired_at:
          type: string
          format: date-time
        last_activity_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_caller:
          type: boolean
          description: True when the caller is the lock holder.

    AcquireFinalizeLockRequest:
      type: object
      description: |
        Request body for POST .../finalize/lock. override=true takes a
        fresh lock held by another member, marking the old lock
        superseded.
      properties:
        override:
          type: boolean
          description: When true, supersede an existing fresh lock held by another member.

    PatchFinalizeLockRequest:
      type: object
      required:
        - selected_commit_shas
        - target_branch
        - base_sha
        - mode
      description: |
        Request body for PATCH .../finalize/lock/{lockID}. Atomically
        replaces curation state and bumps last_activity_at.
      properties:
        selected_commit_shas:
          type: array
          items:
            type: string
        target_branch:
          type: string
          maxLength: 200
        base_sha:
          type: string
        mode:
          $ref: '#/components/schemas/PlanMode'
        commit_message:
          type: string
          maxLength: 4096
          nullable: true
          description: Required when mode=squash; ignored when mode=preserve.

    CoAuthor:
      type: object
      required: [name, email]
      description: |
        Co-author of a squash commit. account_id is populated when the
        portal has an account matching the commit author's email; null
        otherwise (the Co-authored-by trailer still works on GitHub etc.).
      properties:
        name:
          type: string
        email:
          type: string
        account_id:
          type: string
          nullable: true

    PlanCommit:
      type: object
      required: [sha, author_name, author_email, subject, committed_at]
      description: |
        Per-commit metadata for the curation summary panel. Resolved by the
        portal from the bare repo via go-git at plan-generation time.
      properties:
        sha:
          type: string
        author_name:
          type: string
        author_email:
          type: string
        account_id:
          type: string
          nullable: true
          description: |
            Portal account matching this commit's author email, or null.
        subject:
          type: string
          description: First line of the commit message.
        committed_at:
          type: string
          format: date-time

    FetchSource:
      type: object
      required: [kind]
      description: |
        How the local plugin should fetch the session refs needed to run
        the script. kind=https carries the portal's smart-HTTP remote URL;
        kind=local is set plugin-side when a local session checkout exists
        (the portal never returns kind=local).
      properties:
        kind:
          type: string
          enum: [local, https]
        path:
          type: string
          nullable: true
          description: Local checkout path (plugin-set; never populated by the portal).
        remote_url:
          type: string
          nullable: true
          description: |
            Portal git smart-HTTP URL for this session's bare repo. The
            plugin pairs this with an ephemeral fetch token from
            /finalize/fetch-token when no local checkout is present.
        token_expires_at:
          type: string
          format: date-time
          nullable: true
          description: |
            Token expiry. Always null in the plan response; the token is
            minted on the dedicated fetch-token endpoint, not on plan-fetch.

    PlanResponse:
      type: object
      required:
        - plan_id
        - mode
        - script
        - lock_status
        - fetch_source
        - selected_commits
        - target_branch
        - base_sha
      description: |
        Deterministic finalize plan computed from a held lock's curation
        state plus the live bare-repo commit metadata. The plan pins to
        the curated SHAs at the moment of generation — even if draft
        advances afterwards, the script references the exact reviewed SHAs.
      properties:
        plan_id:
          type: string
          description: Opaque to clients. Format `<session_id>:<lock_id>`.
        mode:
          $ref: '#/components/schemas/PlanMode'
        script:
          type: string
          description: |
            Bash script body. In squash mode: cherry-pick --no-commit of
            every curated SHA followed by a single git commit consuming
            the composed message as a heredoc. In preserve mode: one
            git cherry-pick per curated SHA. Carries `set -euo pipefail`,
            verbose `==>` echos, and the literal placeholders
            `$JAMSESH_FETCH_REMOTE`, `$JAMSESH_RUNNER_NAME`,
            `$JAMSESH_RUNNER_EMAIL` the plugin substitutes.
        commit_message:
          type: string
          nullable: true
          description: |
            Composed squash message body (squash mode only). null in
            preserve mode.
        co_authors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CoAuthor'
          description: |
            Co-authors in first-appearance order across the selection
            (squash mode only). null in preserve mode.
        lock_status:
          $ref: '#/components/schemas/LockStatus'
        fetch_source:
          $ref: '#/components/schemas/FetchSource'
        selected_commits:
          type: array
          items:
            $ref: '#/components/schemas/PlanCommit'
        target_branch:
          type: string
        base_sha:
          type: string

    WsTicketResponse:
      type: object
      required: [ticket, expires_in_seconds]
      description: |
        Short-lived single-use ticket for WebSocket upgrade authentication.
        The ticket is valid for 60 seconds and can be consumed exactly once.
        Pass it in `Sec-WebSocket-Protocol` as `jamsesh-ticket.<ticket>`.
      properties:
        ticket:
          type: string
          description: Opaque base64url-encoded ticket value.
        expires_in_seconds:
          type: integer
          description: Number of seconds until the ticket expires (always 60).

    FetchTokenResponse:
      type: object
      required: [token, remote_url, expires_at]
      description: |
        Ephemeral fetch-only credential issued for the plugin's HTTPS-
        fallback path. The token is a regular access token bound to the
        caller with a short TTL (5 min). The plugin passes the token via
        `git -c http.extraHeader="Authorization: Bearer <token>"` so it
        never appears in the remote URL or `.git/config`.
      properties:
        token:
          type: string
          description: |
            Raw access token. Pass via `Authorization: Bearer` HTTP header
            (using `git -c http.extraHeader`). Do not splice into the URL.
        remote_url:
          type: string
          description: |
            Plain git remote URL with no credentials:
            `https://<portal-host>/git/<orgID>/<sessionID>.git`.
            Credentials are passed separately via http.extraHeader.
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the token expires.

    MarkShippedRequest:
      type: object
      description: |
        Optional body for POST .../mark-shipped. final_branch_name records
        the branch the squash commit was pushed to, so the archived-session
        listing can show "shipped as <branch>".
      properties:
        final_branch_name:
          type: string
          nullable: true
          description: |
            The branch name the plugin pushed the squash commit to. Optional;
            when omitted, the event payload omits it too.

    # ---------------------------------------------------------------------------
    # Playground session schemas
    # ---------------------------------------------------------------------------

    CreatePlaygroundSessionRequest:
      type: object
      description: |
        Optional body for POST /api/playground/sessions. All fields are optional;
        the server supplies defaults for any omitted field. No auth required.
      properties:
        name:
          type: string
          maxLength: 200
          description: Display name for the session. Defaults to "playground-<short-id>" when omitted.
          example: "demo"
        goal:
          type: string
          maxLength: 4096
          description: Free-text objective for the session. Defaults to empty string.
          example: "Explore the new auth refactor"
        scope:
          type: string
          description: |
            JSON array of path globs defining the writable scope.
            Defaults to "**" (allow all paths) when omitted.
          example: '["**"]'

    JoinPlaygroundSessionRequest:
      type: object
      description: |
        Body for POST /api/playground/sessions/{id}/join. The nickname field is
        optional; if absent the server picks a handle using the wordlist generator.
        If the suggested nickname is already taken in the session, the server retries
        with a fresh wordlist pick (up to 10 attempts) before falling back to a
        random-suffix handle.
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 24
          pattern: "^[a-zA-Z0-9-]+$"
          description: |
            Requested display handle (e.g. "amber-otter"). Optional; server picks
            one if absent. Server retries on collision with a fresh wordlist pick.
            Must be 2-24 characters, letters/digits/dashes only.
          example: "quiet-fox"

    PlaygroundSessionCreated:
      type: object
      required: [session, bearer, nickname, expires_at]
      description: |
        Response body for POST /api/playground/sessions (201 Created).
        Contains the session summary, the anonymous bearer token for git and
        REST calls, the server-assigned handle, and the token expiry timestamp.
      properties:
        session:
          $ref: '#/components/schemas/PlaygroundSessionSummary'
        bearer:
          type: string
          description: |
            Raw anonymous-session bearer token. Must be stored by the client
            and passed as HTTP Basic password for git and as Authorization
            Bearer for REST calls. Valid until expires_at.
          example: "jamsesh_anon_01abcdef..."
        nickname:
          type: string
          description: Server-assigned pronounceable handle (adjective-animal form).
          example: "amber-otter"
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the bearer (and hard-cap) expires.

    PlaygroundJoinResult:
      type: object
      required: [session, bearer, nickname, expires_at]
      description: |
        Response body for POST /api/playground/sessions/{id}/join (200 OK).
      properties:
        session:
          $ref: '#/components/schemas/PlaygroundSessionSummary'
        bearer:
          type: string
          description: Raw anonymous-session bearer token for the joining participant.
          example: "jamsesh_anon_01xyz..."
        nickname:
          type: string
          description: Confirmed handle for this participant (may differ from requested if collision).
          example: "quiet-fox"
        expires_at:
          type: string
          format: date-time
          description: |
            ISO-8601 timestamp when this bearer expires (synced to the session
            hard-cap deadline, minus elapsed time).

    PlaygroundSessionSummary:
      type: object
      required: [id, org_id, name, goal, scope, status, created_at, hard_cap_at, idle_timeout_at, members_count]
      description: Compact session descriptor returned by playground endpoints.
      properties:
        id:
          type: string
          description: Session ID
          example: "sess_01abcdef012345"
        org_id:
          type: string
          description: Reserved playground org ID ("org_playground")
          example: "org_playground"
        name:
          type: string
          description: Display name
          example: "playground-01ab"
        goal:
          type: string
          description: Session objective (may be empty)
        scope:
          type: string
          description: JSON array of writable-scope globs
          example: '["**"]'
        status:
          type: string
          enum: [active, ended]
          description: Session lifecycle status
        created_at:
          type: string
          format: date-time
          description: ISO-8601 creation timestamp
        hard_cap_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the session is hard-terminated
        idle_timeout_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the session is idle-terminated (last activity + IdleTimeout)
        members_count:
          type: integer
          description: Current number of participants

    PlaygroundTombstone:
      type: object
      required: [session_id, org_id, members_count, commits_count, auto_merges_count, duration_seconds, end_reason, ended_at, expires_at]
      description: |
        Destruction summary for a playground session that has ended. Returned by
        GET /api/playground/sessions/{id}/tombstone. The tombstone is retained for
        TombstoneTTL (default 30 days) after destruction, after which both the
        tombstone and the GET endpoint return 404.
      properties:
        session_id:
          type: string
          description: ID of the destroyed session
        org_id:
          type: string
          description: Org ID (always "org_playground")
        members_count:
          type: integer
          description: Total participants at time of destruction
        commits_count:
          type: integer
          description: Total commits pushed to the session
        auto_merges_count:
          type: integer
          description: Total auto-merges that succeeded during the session
        duration_seconds:
          type: integer
          description: Session lifetime in seconds (ended_at minus created_at)
        end_reason:
          type: string
          enum: [idle, hard_cap, manual]
          description: Why the session was destroyed
        ended_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the session was destroyed
        expires_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp when this tombstone itself expires (default 30 days after ended_at)

    SessionResumeRequest:
      type: object
      required: [org_id, session_id]
      description: |
        Request body for POST /api/session-resumes. Identifies the session
        the CLI wants to resume via the browser portal.
      properties:
        org_id:
          type: string
          description: The org that owns the session.
        session_id:
          type: string
          description: The session the CLI is resuming into.

    SessionResumeExchangeRequest:
      type: object
      required: [resume_token]
      description: |
        Request body for POST /api/session-resumes/exchange. Presents the
        single-use resume token (extracted from the URL fragment by the SPA)
        to receive a session-scoped credential.
      properties:
        resume_token:
          type: string
          description: |
            The raw single-use resume token extracted from the URL fragment
            (`#rt=<token>`). This is the credential; it is consumed atomically
            on exchange.

    SessionResumeExchangeResponse:
      type: object
      required: [bearer, expires_at, session_id, org_id, kind, account_id, display_name]
      description: |
        Response body for POST /api/session-resumes/exchange (200 OK).
        Contains the issued credential and session context.
      properties:
        bearer:
          type: string
          description: |
            The issued session credential.
            - playground (kind=playground): an anonymous-session bearer, valid
              for the remaining session hard-cap duration.
            - durable (kind=durable): a short-lived access token (AccessTokenTTL),
              no refresh token.
        expires_at:
          type: string
          format: date-time
          description: When the issued bearer expires.
        session_id:
          type: string
          description: The session this credential grants access to.
        org_id:
          type: string
          description: The org that owns the session.
        kind:
          type: string
          enum: [playground, durable]
          description: |
            "playground" when the account is anonymous (playground session);
            "durable" when the account has a persistent identity.
        account_id:
          type: string
          description: The account ID for which the credential was issued.
        display_name:
          type: string
          description: The display name of the account.

    SessionResumeResponse:
      type: object
      required: [resume_url, expires_in, session_id]
      description: |
        Response body for POST /api/session-resumes (200 OK).
        The resume_url contains the raw single-use token in its URL fragment
        (#rt=<token>) so the token never appears in server logs. The CLI opens
        the URL verbatim in the browser. expires_in is always 60 (seconds).
      properties:
        resume_url:
          type: string
          description: |
            The full URL the CLI should open in a browser. The raw token is
            embedded in the URL fragment: `#rt=<raw_token>`. The SPA reads
            the fragment client-side; the token never appears in server-side
            request logs.
          example: "https://portal.example.com/orgs/org_01abc/sessions/sess_01xyz/resume#rt=deadbeef"
        expires_in:
          type: integer
          description: Seconds until the resume token expires. Always 60.
          example: 60
        session_id:
          type: string
          description: The session ID bound to this token.

    PortalInfo:
      type: object
      required: [playground_enabled, landing_variant]
      properties:
        playground_enabled:
          type: boolean
          description: Whether the playground subsystem is enabled on this deploy
          example: true
        landing_variant:
          type: string
          enum: [auto, project, login]
          description: |
            What anonymous visitors see at "/":
            "auto" — redirect to /playground when playground is enabled, else /login;
            "project" — render the project landing page;
            "login" — redirect to /login (today's default behaviour).
          example: auto

  responses:
    Unauthorized:
      description: missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    Forbidden:
      description: authenticated but not permitted for the requested operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    NotFound:
      description: requested route or resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

paths:
  /api/auth/refresh:
    post:
      summary: Exchange a refresh token for a new access+refresh pair
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: New token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/ws-ticket:
    post:
      summary: Issue a short-lived single-use WebSocket upgrade ticket
      operationId: issueWsTicket
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Ticket issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WsTicketResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/revoke:
    post:
      summary: Revoke a token (or all tokens for the account)
      operationId: revokeToken
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                revoke_all:
                  type: boolean
                  default: false
      responses:
        '204':
          description: Revocation complete
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/logout:
    post:
      summary: Revoke all tokens for the authenticated account (sign-out)
      description: >
        Convenience endpoint for SPA sign-out. The Bearer token in the
        Authorization header identifies the caller AND the account whose
        tokens are revoked — there is no request body. Semantically
        equivalent to POST /api/auth/revoke with the request's bearer
        token and revoke_all=true, but with a zero-body call shape that
        suits a fire-and-forget client.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All tokens revoked; client may now clear local state
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/oauth/start:
    post:
      summary: Begin OAuth authorization flow — returns the provider authorize URL
      operationId: startOAuth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartBody'
      responses:
        '200':
          description: Authorization URL ready for browser redirect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          description: Unknown or unconfigured provider
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Provider not configured on this server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/oauth/callback:
    post:
      summary: Exchange OAuth authorization code for a portal token pair
      operationId: oauthCallback
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthCallbackBody'
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '400':
          description: Invalid or expired state nonce, or provider mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/magic-link/request:
    post:
      summary: Request a magic-link sign-in email
      operationId: requestMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequestBody'
      responses:
        '204':
          description: Magic link email sent (or silently accepted if address unknown)
        '400':
          description: |
            Bad request. Possible error codes:
            - `magic_link.reserved_domain` — email domain is reserved for internal use (e.g. @playground.local synthetic accounts).
            - `auth.magic_link_not_enabled` — portal has no email provider configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Internal server error (email delivery failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/magic-link/exchange:
    post:
      summary: Exchange a magic-link token for a portal token pair
      operationId: exchangeMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkExchangeBody'
      responses:
        '200':
          description: Token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/portal/info:
    get:
      summary: Return deploy-time portal configuration for anonymous bootstrap
      operationId: getPortalInfo
      description: |
        Returns the portal's deploy-time configuration that the SPA needs before
        authentication: whether the playground is enabled and which landing variant
        is active. No authorization required — the endpoint is intentionally public
        so the SPA can fetch it on bootstrap before the auth flow completes.
      security: []
      responses:
        '200':
          description: Portal info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalInfo'

  /api/me:
    get:
      summary: Return the authenticated account's profile and org memberships
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account info with org memberships
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/orgs:
    post:
      summary: Create a new org; the authenticated account becomes its creator
      operationId: createOrg
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrgBody'
      responses:
        '201':
          description: Org created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgRef'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/orgs/{orgID}:
    get:
      operationId: GetOrg
      summary: Fetch org details. Requires org membership.
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
      responses:
        '200':
          description: Org details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: PatchOrg
      summary: Update org-level settings. Admin role (creator) required.
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                session_invite_policy:
                  $ref: '#/components/schemas/OrgSessionInvitePolicy'
      responses:
        '200':
          description: Org updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Org is protected and cannot be mutated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/members:
    get:
      summary: List members of an org (requires creator or member role)
      operationId: listOrgMembers
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
      responses:
        '200':
          description: List of org members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberRef'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/orgs/{orgID}/invites:
    post:
      summary: Create an org invite (requires creator role); sends email to recipient
      operationId: createOrgInvite
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteBody'
      responses:
        '201':
          description: Invite created; email sent to recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteRef'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/orgs/{orgID}/invites/{inviteID}/accept:
    post:
      summary: Accept a pending org invite (requires Bearer; verifies token + recipient email)
      operationId: acceptOrgInvite
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: inviteID
          in: path
          required: true
          schema:
            type: string
          description: Invite ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteBody'
      responses:
        '200':
          description: Invite accepted; account bound as org member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgRef'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Invite already accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions:
    get:
      summary: List sessions visible to the caller (active + recent), cursor-paginated
      operationId: listSessions
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque cursor from a previous response's next_cursor field.
            Omit to start from the first page.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Maximum number of sessions to return per page
      responses:
        '200':
          description: Paginated session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '400':
          description: Invalid or mismatched cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create a new session in the org; the authenticated account becomes the creator
      operationId: createSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/orgs/{orgID}/sessions/{sessionID}:
    get:
      summary: Get a session's metadata and member list
      operationId: getSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session metadata with member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update goal, scope (widening only), or default_mode; creator only
      operationId: patchSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSessionRequest'
      responses:
        '200':
          description: Session updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Scope narrowing rejected or invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/finalize:
    post:
      summary: Transition session to finalizing; idempotent if already finalizing
      operationId: finalizeSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session is finalizing (or was already finalizing)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session has already ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/abandon:
    post:
      summary: Abandon the session without finalizing; sets status=ended, end_reason=abandoned; creator only
      operationId: abandonSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Session abandoned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session has already ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/refs:
    get:
      summary: List all refs in the session bare repository with mode and tip SHA
      operationId: listSessionRefs
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '200':
          description: Ref list with mode annotations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/digest:
    get:
      summary: Assembled turn-start digest for additionalContext injection
      operationId: getSessionDigest
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: since
          in: query
          required: false
          schema:
            type: integer
            format: int64
            default: 0
          description: |
            Event seq to start from (exclusive). Pass 0 or omit to get all events.
            Use the next_cursor from the previous response on subsequent calls.
      responses:
        '200':
          description: Formatted digest text and next cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DigestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/invites:
    post:
      summary: Invite a user to a session by email; sends a magic-link-style join email
      operationId: inviteToSession
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
      responses:
        '201':
          description: Invite created and email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invite'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/invites/{inviteID}:
    get:
      summary: Fetch invite details for rendering the InviteAccept screen.
      operationId: getSessionInvite
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: inviteID
          in: path
          required: true
          schema:
            type: string
          description: Invite ID
        - name: token
          in: query
          required: true
          description: Raw invite token from the email link.
          schema:
            type: string
      responses:
        '200':
          description: Invite details for rendering the InviteAccept screen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInviteDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Invite already accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/invites/{inviteID}/accept:
    post:
      summary: Accept a session invite; binds the caller to the session as a member
      operationId: acceptSessionInvite
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: inviteID
          in: path
          required: true
          schema:
            type: string
          description: Invite ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        '200':
          description: Invite accepted; returns session with updated member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invite already accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/members/{accountID}/remove:
    post:
      summary: Remove a member from a session; creator only
      operationId: removeSessionMember
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: accountID
          in: path
          required: true
          schema:
            type: string
          description: Account ID to remove
      responses:
        '204':
          description: Member removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/comments:
    get:
      summary: List comments in a session, cursor-paginated, with optional filters
      operationId: listComments
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: |
            Opaque cursor from a previous response's next_cursor field.
            Omit to start from the first page.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Maximum number of comments to return per page
        - name: addressed_to
          in: query
          required: false
          schema:
            type: string
          description: Substring filter on the addressed_to field
        - name: kind
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CommentKind'
          description: Filter by comment kind (exact match)
        - name: resolved
          in: query
          required: false
          schema:
            type: string
            enum: ['true', 'false']
          description: |
            Filter by resolved status. "true" = resolved only; "false" = unresolved only;
            absent = all comments.
        - name: anchor_commit_sha
          in: query
          required: false
          schema:
            type: string
          description: Filter by anchor commit SHA (exact match)
        - name: anchor_file_path
          in: query
          required: false
          schema:
            type: string
          description: Filter by anchor file path (exact match)
      responses:
        '200':
          description: Paginated comment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentListResponse'
        '400':
          description: Invalid or mismatched cursor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Create a new comment anchored to a commit in the session
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/comments/{commentId}/resolve:
    post:
      summary: Mark a comment as resolved with an optional resolution note
      operationId: resolveComment
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: commentId
          in: path
          required: true
          schema:
            type: string
          description: Comment ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveCommentRequest'
      responses:
        '200':
          description: Comment resolved; returns updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Comment already resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/files:
    get:
      summary: Fetch file content at a specific commit
      operationId: getSessionFile
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: commit
          in: query
          required: true
          schema:
            type: string
          description: Commit SHA
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: File path within the commit tree
      responses:
        '200':
          description: File content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionFileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: File too large to view inline (>1MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/ref-modes:
    post:
      summary: Upsert the collaboration mode for a specific ref
      operationId: upsertRefMode
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRefModeRequest'
      responses:
        '204':
          description: Ref mode updated
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/finalize/lock:
    post:
      summary: Acquire the finalize lock for a session
      description: |
        Acquires a finalize lock. Idempotent for the caller. If another
        member holds a fresh lock, returns 409 unless override=true is
        passed (in which case the existing lock is superseded). If
        another member holds a stale lock (>30 min idle), the stale
        lock is released and the new one is created.
      operationId: acquireFinalizeLock
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcquireFinalizeLockRequest'
      responses:
        '201':
          description: Lock acquired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LockStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Another member holds an active fresh lock and override is
            false. Error code: finalize.lock_held_by_other.
            details.held_by_account_id carries the holding account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/finalize/lock/{lockID}:
    patch:
      summary: Update curation state on a held finalize lock
      description: |
        Atomically replaces the lock's selected_commit_shas,
        target_branch, base_sha, mode, and commit_message; refreshes
        last_activity_at. Caller must hold the lock. Returns 409 when
        the lock is idle (>30 min), released, or superseded.
      operationId: patchFinalizeLock
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: lockID
          in: path
          required: true
          schema:
            type: string
          description: Lock ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchFinalizeLockRequest'
      responses:
        '200':
          description: Lock curation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeLock'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Lock cannot be patched. Error codes:
            finalize.lock_expired (idle >30 min — row is now released),
            finalize.lock_released, finalize.lock_superseded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Release the finalize lock
      description: |
        Releases the lock. Idempotent on already-released rows. Caller
        must be the lock holder. Clears the sessions.finalize_locked_by
        pointer when this lock was the active one. The session status
        stays finalizing — release is not the same as abandon.
      operationId: releaseFinalizeLock
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: lockID
          in: path
          required: true
          schema:
            type: string
          description: Lock ID
      responses:
        '204':
          description: Lock released (or already released)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/finalize-plan:
    get:
      summary: Compute the finalize plan for a held lock
      description: |
        Returns a deterministic plan computed from the lock's curation
        state plus the live bare-repo commit metadata: the per-commit
        summary, the composed squash message + co-author trailer list
        (squash mode), the bash script body, and the fetch-source the
        plugin uses when no local session checkout exists. The same lock
        state + same bare repo always produces the same plan bytes, so
        the portal UI and the plugin render identical previews to the
        human before execution.

        409 codes carried in the ErrorEnvelope `error` field:
          - finalize.lock_expired      — last_activity_at older than 30 min
          - finalize.lock_superseded   — lock has been overridden
          - finalize.commit_missing    — a curated SHA is absent from the
                                         bare repo; details.missing_sha
      operationId: getFinalizePlan
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
        - name: lock_id
          in: query
          required: true
          schema:
            type: string
          description: |
            Lock ID. Plan generation is bound to a specific lock so the
            response pins to that lock's curation state.
      responses:
        '200':
          description: Finalize plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Plan cannot be generated. Error codes:
            finalize.lock_expired, finalize.lock_superseded,
            finalize.commit_missing (with details.missing_sha).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/orgs/{orgID}/sessions/{sessionID}/finalize/fetch-token:
    post:
      summary: Issue an ephemeral fetch-only token for the session's bare repo
      description: |
        Mints a short-TTL (5 min) access token bound to the caller, plus
        a pre-composed git remote URL that splices the token into the
        userinfo segment. Used by the plugin's HTTPS-fallback path when
        no local session checkout is present. Only session members may
        mint a token.

        The credential is valid for the full TTL window — long enough for
        `git fetch` to complete — and is accepted by the same basic-auth
        middleware that protects the git smart-HTTP endpoints (per-row
        expiry, no special-casing).
      operationId: issueFetchToken
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      responses:
        '201':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchTokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/orgs/{orgID}/sessions/{sessionID}/mark-shipped:
    post:
      summary: Mark a finalizing session as shipped
      description: |
        Transitions the session from `finalizing` to `ended` with
        `end_reason = "shipped"`. Records the optional `final_branch_name`
        on the `session.ended` event payload so the archive sweep can
        display "shipped as <branch>" on the archived stub. Any held
        finalize lock is released as part of the transition.

        Idempotent: re-calling on a session already ended with reason
        `shipped` returns 200 with the same session row (no event emission).

        409 codes:
          - `session.not_finalizing` — session is `active`; must finalize first
          - `session.already_ended`  — session is `ended` with a different
            end_reason; details.end_reason carries the value
      operationId: markSessionShipped
      security:
        - bearerAuth: []
      parameters:
        - name: orgID
          in: path
          required: true
          schema:
            type: string
          description: Org ID
        - name: sessionID
          in: path
          required: true
          schema:
            type: string
          description: Session ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkShippedRequest'
      responses:
        '200':
          description: Session marked shipped (or already shipped — idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Session cannot be marked shipped. Error codes:
            session.not_finalizing, session.already_ended (with
            details.end_reason).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/playground/sessions:
    post:
      summary: Create an ephemeral anonymous playground session
      description: |
        Creates a new playground session in the reserved playground org. No
        authentication is required. The server mints an anonymous account +
        bearer for the creator and returns them in the response body. The
        bearer is used for all subsequent REST calls and git-over-HTTPS
        operations within this session.

        Returns 503 when JAMSESH_PLAYGROUND_ENABLED=false.
      operationId: createPlaygroundSession
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlaygroundSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundSessionCreated'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Playground feature is disabled on this deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/playground/sessions/{id}/join:
    post:
      summary: Join an existing playground session
      description: |
        Joins an existing playground session as a new anonymous participant.
        The server mints an anonymous account + bearer for the joiner.

        Returns 409 playground.session_full when the session is at the
        MaxParticipants cap (default 5). The response body includes
        retry_after_seconds and a link to start a fresh session.

        Returns 410 playground.session_ended when the session's hard_cap_at
        has elapsed (the session is still in the DB but effectively over —
        the destruction worker hasn't cleaned it up yet).

        Returns 404 when the session does not exist (never created, or already
        destroyed and tombstone-expired).

        Returns 503 when JAMSESH_PLAYGROUND_ENABLED=false.
      operationId: joinPlaygroundSession
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Playground session ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinPlaygroundSessionRequest'
      responses:
        '200':
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundJoinResult'
        '400':
          description: |
            Bad request. Possible error codes:
            - `playground.invalid_nickname` — nickname does not meet the 2-24 char, letters/digits/dashes rule.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: |
            Session full. Error code: playground.session_full.
            Body includes retry_after_seconds and an alternative URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '410':
          description: "Session has ended. Error code: playground.session_ended."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: Playground feature is disabled on this deployment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/playground/sessions/{id}:
    get:
      summary: Get playground session metadata
      description: |
        Returns a summary of the playground session including remaining time.
        Requires a valid anonymous session bearer issued for this session.
        Returns 401 for missing/invalid bearer and 403 for a valid bearer
        that does not belong to a member of this session.
      operationId: getPlaygroundSession
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Playground session ID
      responses:
        '200':
          description: Session summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundSessionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/session-resumes:
    post:
      summary: Mint a single-use resume token for a CLI-to-browser session handoff
      description: |
        Mints a short-lived (60 s), single-use resume token bound to the
        authenticated account and the given (org, session) pair. The token
        is embedded in the `resume_url` fragment (`#rt=<token>`) so it never
        appears in server-side request logs. The CLI opens `resume_url`
        verbatim in the default browser; the SPA registers the resume route
        and exchanges the fragment token in a later step.

        Only session members may mint a token. The raw token is never
        returned as a standalone field — it is always in the URL fragment.
      operationId: createSessionResume
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionResumeRequest'
      responses:
        '200':
          description: Resume token minted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResumeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/session-resumes/exchange:
    post:
      summary: Exchange a single-use resume token for a session credential
      description: |
        Presents the raw resume token (extracted by the SPA from the URL
        fragment `#rt=<token>`) and receives a session-scoped credential.

        This endpoint is **unauthenticated** — the resume token is the sole
        credential. Any ambient Authorization header is ignored.

        The token is consumed atomically (winner-returning UPDATE…RETURNING).
        All failure cases (expired, already-used, unknown) return the same
        generic error shape — no oracle distinguishing the three cases.
      operationId: exchangeSessionResume
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionResumeExchangeRequest'
      responses:
        '200':
          description: Token exchanged; credential issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResumeExchangeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/playground/sessions/{id}/tombstone:
    get:
      summary: Get the destruction summary for an ended playground session
      description: |
        Returns the tombstone record for a destroyed playground session.
        Returns 404 when the session is still active OR when the tombstone
        TTL (default 30 days) has elapsed. This endpoint is what the
        portal-UI post-destruction page reads from.
      operationId: getPlaygroundTombstone
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Playground session ID
      responses:
        '200':
          description: Tombstone record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaygroundTombstone'
        '404':
          $ref: '#/components/responses/NotFound'
